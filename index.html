<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thepolka.party</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: sans-serif;
    }
    canvas { display: block; position: fixed; inset: 0; }

    /* ── Top-right wrapper ── */
    #topbar {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Controls pill ── */
    #controls {
      display: flex;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.85);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 999px;
      padding: 8px 14px 8px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    #muteBtn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
    }
    #controls label {
      color: rgba(0,0,0,0.45);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Custom color picker ── */
    #colorDrop {
      position: relative;
    }
    #colorTrigger {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      white-space: nowrap;
    }
    #triggerSwatch {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
      background: #ddd;
      transition: background 0.25s;
    }
    #triggerLabel { min-width: 80px; }
    .drop-chevron {
      font-size: 10px;
      color: #888;
      margin-left: 2px;
    }

    /* Dropdown panel */
    #colorMenu {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      overflow: hidden;
      min-width: 180px;
      z-index: 300;
      max-height: 340px;
      overflow-y: auto;
    }
    #colorMenu.open { display: block; }
    .color-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #111;
      transition: background 0.12s;
    }
    .color-opt:hover { background: #f5f5f5; }
    .color-opt.selected { background: #f0f0f0; font-weight: 700; }
    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.12);
    }

    /* ── Sign ── */
    #sign {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ff1744;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.01em;
      padding: 10px 22px;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(255,23,68,0.4);
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #sign .arrow {
      font-size: 24px;
      line-height: 1;
      animation: bounce-arrow 0.55s ease-in-out infinite alternate;
      display: inline-block;
    }
    @keyframes bounce-arrow {
      from { transform: translateX(0); }
      to   { transform: translateX(8px); }
    }
    #sign.hidden { opacity: 0; }

    #sign .mobile-arrow { display: none; }

    @media (max-width: 600px) {
      #topbar {
        flex-direction: column-reverse;
        align-items: flex-end;
        gap: 8px;
      }
      #sign {
        font-size: 15px;
        padding: 8px 16px;
      }
      #sign .desktop-arrow { display: none; }
      #sign .mobile-arrow  { display: inline-block; }
    }
  </style>
</head>
<body>

<audio id="bg" src="music.mp3" loop></audio>
<canvas id="c"></canvas>

<div id="topbar">
  <div id="sign">
    <span>Start the party!</span>
    <span class="arrow desktop-arrow">→</span>
    <span class="arrow mobile-arrow">↑</span>
  </div>

  <div id="controls">
  <button id="muteBtn" type="button" title="Mute / Unmute">🎵</button>
  <label>Color</label>
  <div id="colorDrop">
    <button id="colorTrigger" type="button">
      <span id="triggerSwatch"></span>
      <span id="triggerLabel">Pick one</span>
      <span class="drop-chevron">▾</span>
    </button>
    <div id="colorMenu"></div>
  </div>
</div>
</div>

<script>
  const COLORS = [
    { value: 'rainbow',  label: '🌈 Rainbow',       hex: null },
    { value: '#ff1744',  label: 'Cherry Bomb',       hex: '#ff1744' },
    { value: '#ff4ecb',  label: 'Hot Pink',          hex: '#ff4ecb' },
    { value: '#ff85c2',  label: 'Bubblegum',         hex: '#ff85c2' },
    { value: '#ff6b6b',  label: 'Coral Reef',        hex: '#ff6b6b' },
    { value: '#ff4500',  label: 'Lava',              hex: '#ff4500' },
    { value: '#ff7733',  label: 'Creamsicle',        hex: '#ff7733' },
    { value: '#ffc300',  label: 'Gold Rush',         hex: '#ffc300' },
    { value: '#ffe135',  label: 'Banana Split',      hex: '#ffe135' },
    { value: '#ccff00',  label: 'Electric Lime',     hex: '#ccff00' },
    { value: '#39ff14',  label: 'Slime',             hex: '#39ff14' },
    { value: '#3ddc84',  label: 'Frog Prince',       hex: '#3ddc84' },
    { value: '#00d4c8',  label: 'Mermaid',           hex: '#00d4c8' },
    { value: '#40e0d0',  label: 'Turquoise Dream',   hex: '#40e0d0' },
    { value: '#3ab4f2',  label: 'Pool Water',        hex: '#3ab4f2' },
    { value: '#0080ff',  label: 'Deep Ocean',        hex: '#0080ff' },
    { value: '#5c6bc0',  label: 'Blueberry Jam',     hex: '#5c6bc0' },
    { value: '#7c4dff',  label: 'Midnight Crush',    hex: '#7c4dff' },
    { value: '#b36bff',  label: 'Grape Soda',        hex: '#b36bff' },
    { value: '#f48fb1',  label: 'Cotton Candy',      hex: '#f48fb1' },
    { value: '#d4380d',  label: 'Rust Belt',         hex: '#d4380d' },
    { value: '#7fff00',  label: 'Alien Goo',         hex: '#7fff00' },
    { value: '#e8e8e8',  label: 'Ghost',             hex: '#e8e8e8' },
  ]

  const RAINBOW_HEX = COLORS.filter(c => c.hex).map(c => c.hex)

  const canvas       = document.getElementById('c')
  const ctx          = canvas.getContext('2d')
  const sign         = document.getElementById('sign')
  const colorMenu    = document.getElementById('colorMenu')
  const colorTrigger = document.getElementById('colorTrigger')
  const triggerSwatch = document.getElementById('triggerSwatch')
  const triggerLabel  = document.getElementById('triggerLabel')

  // Build menu items
  COLORS.forEach(c => {
    const el = document.createElement('div')
    el.className = 'color-opt'
    el.dataset.value = c.value
    const dot = document.createElement('span')
    dot.className = 'color-dot'
    dot.style.background = c.hex
      ? c.hex
      : 'conic-gradient(#ff1744,#ff7733,#ffe135,#39ff14,#3ab4f2,#7c4dff,#ff4ecb,#ff1744)'
    el.appendChild(dot)
    el.appendChild(document.createTextNode(c.label))
    el.addEventListener('click', () => selectColor(c))
    colorMenu.appendChild(el)
  })

  // Toggle menu open/close
  colorTrigger.addEventListener('click', () => colorMenu.classList.toggle('open'))
  document.addEventListener('click', e => {
    if (!e.target.closest('#colorDrop')) colorMenu.classList.remove('open')
  })

  const R          = 18
  const GAP        = 22
  const CELL       = R * 2 + GAP
  const SWING      = 22
  const BOB        = 10
  const FREQ       = 0.0008
  const ROW_PHASE  = 0.55
  const COL_PHASE  = 0.35
  const RING_FREQ  = 0.00045
  const RING_SCALE = 0.45
  const L_AMP      = 8
  const HUE_AMP    = 7

  let isRainbow  = false
  let solidColor = '#ff4ecb'
  let started    = false

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
  resize()
  window.addEventListener('resize', resize)

  function hexToHsl(hex) {
    let r = parseInt(hex.slice(1,3),16)/255
    let g = parseInt(hex.slice(3,5),16)/255
    let b = parseInt(hex.slice(5,7),16)/255
    const max = Math.max(r,g,b), min = Math.min(r,g,b)
    let h = 0, s = 0
    const l = (max+min)/2
    if (max !== min) {
      const d = max-min
      s = l > 0.5 ? d/(2-max-min) : d/(max+min)
      switch(max) {
        case r: h=((g-b)/d+(g<b?6:0))/6; break
        case g: h=((b-r)/d+2)/6; break
        case b: h=((r-g)/d+4)/6; break
      }
    }
    return [h*360, s*100, l*100]
  }
  const RAINBOW_HSL = RAINBOW_HEX.map(hexToHsl)

  // ── Audio ──
  const bgAudio = document.getElementById('bg')
  const muteBtn = document.getElementById('muteBtn')
  let musicStarted = false

  function startMusic() {
    if (musicStarted) return
    musicStarted = true
    bgAudio.volume = 0.7
    bgAudio.play().catch(() => {})
  }
  muteBtn.addEventListener('click', () => {
    if (!musicStarted) { startMusic(); muteBtn.textContent = '🔊' }
    else if (bgAudio.muted) { bgAudio.muted = false; muteBtn.textContent = '🔊' }
    else { bgAudio.muted = true; muteBtn.textContent = '🔇' }
  })

  function selectColor(c) {
    // Update trigger display
    triggerSwatch.style.background = c.hex
      ? c.hex
      : 'conic-gradient(#ff1744,#ff7733,#ffe135,#39ff14,#3ab4f2,#7c4dff,#ff4ecb,#ff1744)'
    triggerLabel.textContent = c.label
    colorMenu.classList.remove('open')
    colorMenu.querySelectorAll('.color-opt').forEach(el =>
      el.classList.toggle('selected', el.dataset.value === c.value))

    isRainbow  = c.value === 'rainbow'
    solidColor = c.hex || '#ff4ecb'

    if (!started) {
      started = true
      sign.classList.add('hidden')
    }
    startMusic()
    muteBtn.textContent = '🔊'
  }

  // ── Draw ──
  function draw(ts) {
    const W = canvas.width, H = canvas.height
    ctx.clearRect(0, 0, W, H)
    const cols = Math.ceil(W/CELL)+2, rows = Math.ceil(H/CELL)+2
    const startX = ((W%CELL)/2)+R, startY = ((H%CELL)/2)+R
    const centerCol = cols/2, centerRow = rows/2

    for (let row = 0; row < rows; row++) {
      const swingPhase = started ? Math.sin(ts*FREQ + row*ROW_PHASE) : 0
      const xShift = swingPhase * SWING
      for (let col = 0; col < cols; col++) {
        const yShift = started ? Math.sin(ts*FREQ*1.4 + col*COL_PHASE + row*0.2)*BOB : 0
        const cx = startX + col*CELL + xShift
        const cy = startY + row*CELL + yShift
        let fH, fS, fL
        if (!started) {
          fH = 0; fS = 0; fL = 20
        } else {
          const dr = Math.sqrt((col-centerCol)**2 + (row-centerRow)**2)
          const ring = Math.sin(dr*RING_SCALE - ts*RING_FREQ)
          const lBoost = ring*L_AMP
          const hShift = swingPhase*HUE_AMP
          let h, s, l
          if (isRainbow) {
            ;[h,s,l] = RAINBOW_HSL[(row*3+col) % RAINBOW_HSL.length]
          } else {
            ;[h,s,l] = hexToHsl(solidColor)
          }
          fH = (h+hShift+360)%360; fS = s; fL = Math.max(15,Math.min(85,l+lBoost))
        }
        ctx.beginPath()
        ctx.arc(cx, cy, R, 0, Math.PI*2)
        ctx.fillStyle = `hsl(${fH},${fS}%,${fL}%)`
        ctx.fill()
      }
    }
    requestAnimationFrame(draw)
  }
  requestAnimationFrame(draw)
</script>
</body>
</html>
